# Build TellMe Windows .exe — run manually after adding secrets
# Uses Ubuntu (electron-builder cross-compiles for Windows)
name: Build Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Verify windows folder
        shell: bash
        run: |
          if [ ! -d windows ]; then echo "::error::windows/ folder missing after checkout"; ls -la; exit 1; fi
          echo "✓ windows/ exists"

      - name: Check secrets
        shell: bash
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "::error::Add SUPABASE_URL and SUPABASE_ANON_KEY as repository secrets"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root deps
        shell: bash
        run: npm install

      - name: Inject env vars
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node build.js

      - name: Build Windows exe
        shell: bash
        run: |
          npm install --prefix windows
          node windows/build-win.js

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TellMe-Windows
          path: dist-win/*.exe
